services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=trafficman
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d trafficman"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
        sh -c "python manage.py migrate --noinput &&
           python manage.py collectstatic --noinput &&
           python manage.py createsuperuser --noinput || true &&
           gunicorn --bind 0.0.0.0:8000 trafficman.wsgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A trafficman worker -l info
    volumes:
      - .:/app
    depends_on: [web]

  celery_beat:
    build: .
    command: celery -A trafficman beat -l info
    volumes:
      - .:/app
    depends_on: [web]

volumes:
  postgres_data:
